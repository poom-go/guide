<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매처 계정 관리 최종 무삭제판</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 가이드 시스템 스타일 - 원본 스타일 훼손 절대 없음 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f1f3f5; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .guide-container { width: 1400px; height: 900px; background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; overflow: hidden; border: 1px solid #e9ecef; }
        
        /* 💡 선명한 파란색 테두리 강조 (버튼 배경과 겹치지 않게 offset 2px) */
        .target-focus-ani { 
            outline: 3px solid #0040D1 !important; 
            outline-offset: 2px !important; 
            z-index: 9999999 !important; 
            position: relative; 
            background-color: rgba(0, 64, 209, 0.05) !important; 
            border-radius: 4px;
        }

        #click-hint-badge { position: absolute; background: #0040D1; color: #fff; font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 4px; z-index: 10000000; display: none; animation: hintJump 1s infinite; }
        @keyframes hintJump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .play-overlay-full { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9); z-index: 100000000; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .play-overlay-full.hidden { opacity: 0; pointer-events: none; }
        .btn-start-action { background: #0040D1; color: #fff; border: none; padding: 25px 60px; border-radius: 60px; font-size: 22px; font-weight: 700; cursor: pointer; }

        .step-view-wrap { display: none; width: 100%; height: 100%; }
        .step-view-wrap.active { display: block; }
        .typing-active-box { border-color: #0040D1 !important; background-color: #f8faff !important; }

        /* 등록 완료 행 */
        #added-row { display: none; }
        #added-row.visible { display: table-row; }
    </style>
</head>
<body>

<div class="guide-container">
    <div id="click-hint-badge">클릭</div>
    <div class="play-overlay-full" id="finalOverlay"><button class="btn-start-action" onclick="runCompleteManual()">과정 영상 보기 ▶</button></div>

    <div id="view-modal" class="step-view-wrap">
    <div style="display: flex; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; padding: 24px;">
        <div style="width: min(520px, 100%); max-height: calc(100vh - 48px); background-color: #ffffff; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden;">
            
            <div style="padding: 20px 24px; border-bottom: 1px solid #dee2e6; flex-shrink: 0;">
                <h2 style="font-size: 16px; font-weight: bold; color: #333;">판매처 계정 개별 등록</h2>
            </div>

            <div style="padding: 24px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; flex: 1; min-height: 0;">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 13px; font-weight: bold;">판매처명*</label>
                    <input type="text" id="type-market" style="padding: 10px 12px; border: 1px solid #748ffc; background: #f8fbff; border-radius: 4px; font-size: 14px;" readonly>
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 13px; font-weight: bold;">브랜드명*</label>
                    <select id="select-brand" style="padding: 10px 12px; border: 1px solid #748ffc; background: #f8fbff; border-radius: 4px; font-size: 14px;">
                        <option value="">선택</option>
                        <option value="품고">품고</option>
                    </select>
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <label style="font-size: 13px; font-weight: bold;">연동 계정*</label>
                    <input type="text" id="type-id" style="padding: 10px 12px; border: 1px solid #748ffc; background: #f8fbff; border-radius: 4px; font-size: 14px;" readonly>
                </div>
            </div>

            <div style="padding: 16px 24px; border-top: 1px solid #dee2e6; display: flex; justify-content: flex-end; background: #f8f9fa; flex-shrink: 0;">
                <button id="trigger-final-btn" style="padding: 10px 24px; border: none; background-color: #0040D1 !important; color: #FFFFFF !important; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer;">등록</button>
            </div>

        </div>
    </div>
</div>

    <div id="view-modal" class="step-view-wrap">
        <div style="display: flex; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
            <div style="width: 520px; background-color: #ffffff; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
                <div style="padding: 20px 24px; border-bottom: 1px solid #dee2e6;"><h2 style="font-size: 16px; font-weight: bold; color: #333;">판매처 계정 개별 등록</h2></div>
                <div style="padding: 24px; display: flex; flex-direction: column; gap: 20px;">
                    <div style="display: flex; flex-direction: column; gap: 8px;"><label style="font-size: 13px; font-weight: bold;">판매처명*</label><input type="text" id="type-market" style="padding: 10px 12px; border: 1px solid #748ffc; background: #f8fbff; border-radius: 4px; font-size: 14px;" readonly></div>
                    <div style="display: flex; flex-direction: column; gap: 8px;"><label style="font-size: 13px; font-weight: bold;">브랜드명*</label><select id="select-brand" style="padding: 10px 12px; border: 1px solid #748ffc; background: #f8fbff; border-radius: 4px; font-size: 14px;"><option value="">선택</option><option value="품고">품고</option></select></div>
                    <div style="display: flex; flex-direction: column; gap: 8px;"><label style="font-size: 13px; font-weight: bold;">연동 계정*</label><input type="text" id="type-id" style="padding: 10px 12px; border: 1px solid #748ffc; background: #f8fbff; border-radius: 4px; font-size: 14px;" readonly></div>
                </div>
                <div style="padding: 16px 24px; border-top: 1px solid #dee2e6; display: flex; justify-content: flex-end; background: #f8f9fa;">
                    <button id="trigger-final-btn" style="padding: 10px 24px; border: none; background-color: #0040D1 !important; color: #FFFFFF !important; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer;">등록</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const hint = document.getElementById('click-hint-badge');
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function playAction(id, wait = 4000, showBadge = true) {
        const el = document.getElementById(id);
        const rect = el.getBoundingClientRect();
        const container = document.querySelector('.guide-container').getBoundingClientRect();
        el.classList.add('target-focus-ani');
        if(showBadge) {
            hint.style.display = 'block';
            hint.style.left = (rect.left - container.left + rect.width / 2 + 10) + 'px';
            hint.style.top = (rect.top - container.top - 15) + 'px';
        }
        await sleep(wait);
        el.classList.remove('target-focus-ani');
        hint.style.display = 'none';
    }

    async function typeText(id, text) {
        const el = document.getElementById(id);
        el.classList.add('typing-active-box');
        el.value = "";
        for (let i = 0; i < text.length; i++) { el.value += text[i]; await sleep(70); }
        await sleep(500);
        el.classList.remove('typing-active-box');
    }

    async function runCompleteManual() {
        document.getElementById('finalOverlay').classList.add('hidden');
        await playAction('trigger-order', 1500);
        await playAction('trigger-account', 1500);
        await playAction('trigger-btn-add', 3500);
        document.getElementById('view-main').classList.remove('active');
        document.getElementById('view-modal').classList.add('active');
        await sleep(1000);
        await typeText('type-market', '스마트스토어(물류사)');
        await playAction('select-brand', 1500);
        document.getElementById('select-brand').value = "품고";
        await sleep(800);
        await typeText('type-id', 'API 연동용 판매자 ID 입력');
        await playAction('trigger-final-btn', 4000);
        document.getElementById('view-modal').classList.remove('active');
        document.getElementById('view-main').classList.add('active');
        document.getElementById('empty-row').style.display = 'none';
        document.getElementById('added-row').classList.add('visible');
        
        // 💡 3단계 자동 강조 (클릭 뱃지 없음)
        await playAction('added-row', 4000, false);
        await sleep(1000);
        location.reload();
    }
</script>
</body>
</html>
