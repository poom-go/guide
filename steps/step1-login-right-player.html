<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매처 계정 관리 과정 영상 - 무삭제 보존판</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 가이드 제어 전용 스타일 (원본 훼손 없음) */
        .full-manual-container { position: relative; width: 100%; height: 850px; overflow: hidden; background: #fff; }
        
        .play-overlay-full {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.9); 
            z-index: 100000; display: flex; justify-content: center; align-items: center; transition: 0.5s;
        }
        .play-overlay-full.hidden { opacity: 0; pointer-events: none; }
        .real-start-btn { 
            background: #0040D1; color: #fff; border: none; padding: 22px 55px; 
            border-radius: 60px; font-size: 20px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,64,209,0.3);
        }

        /* 4초 테두리 강조 스타일 */
        .step-focus-highlight { 
            outline: 4px solid #0040D1 !important; outline-offset: 2px; z-index: 99999; position: relative;
        }
        
        /* 클릭 뱃지 */
        #real-click-badge {
            position: absolute; background: #0040D1; color: #fff; font-size: 13px; font-weight: 700;
            padding: 6px 14px; border-radius: 4px; z-index: 100001; display: none;
            animation: badgeBounceAni 1s infinite;
        }
        @keyframes badgeBounceAni { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        /* 단계 전환용 */
        .manual-step-wrapper { display: none; width: 100%; height: 100%; }
        .manual-step-wrapper.active { display: block; }
        
        /* 팝업 내부 원형 프로필 (두 번째 이미지 디테일) */
        .pop-circle-icon {
            width: 100px; height: 100px; background: #e9ecef; border-radius: 50%;
            margin: 20px auto 10px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: #868e96; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="full-manual-container">
    <div id="real-click-badge">클릭</div>

    <div class="play-overlay-full" id="finalOverlay">
        <button class="real-start-btn" onclick="startFinalManual()">과정 영상 보기 ▶</button>
    </div>

    <div id="view-1" class="manual-step-wrapper active">

                    <li class="menu-item" style="display: flex; align-items: center; padding: 12px 20px; cursor: pointer; color: #495057; font-size: 15px;"><i class="arrow-icon" style="font-size: 11px; color: #adb5bd; margin-right: 8px; font-style: normal; width: 12px; text-align: center;">▶</i><span class="menu-icon" style="margin-right: 10px; display: flex; align-items: center; justify-content: center; width: 20px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#868e96" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></span>재고</li>
                    <li class="menu-item" style="display: flex; align-items: center; padding: 12px 20px; cursor: pointer; color: #495057; font-size: 15px;"><i class="arrow-icon" style="font-size: 11px; color: #adb5bd; margin-right: 8px; font-style: normal; width: 12px; text-align: center;">▶</i><span class="menu-icon" style="margin-right: 10px; display: flex; align-items: center; justify-content: center; width: 20px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#868e96" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg></span>입·출고</li>
                    <li class="menu-item" style="display: flex; align-items: center; padding: 12px 20px; cursor: pointer; color: #495057; font-size: 15px;"><i class="arrow-icon" style="font-size: 11px; color: #adb5bd; margin-right: 8px; font-style: normal; width: 12px; text-align: center;">▶</i><span class="menu-icon" style="margin-right: 10px; display: flex; align-items: center; justify-content: center; width: 20px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#868e96" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg></span>(신)OMS</li>
                    
                    <li class="menu-item" id="act-order" style="display: flex; align-items: center; padding: 12px 20px; cursor: pointer; color: #495057; font-size: 15px;">
                        <i class="arrow-icon" style="font-size: 11px; color: #adb5bd; margin-right: 8px; font-style: normal; width: 12px; text-align: center;">▼</i>
                        <span class="menu-icon" style="margin-right: 10px; display: flex; align-items: center; justify-content: center; width: 20px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#868e96" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></span>
                        <strong>주문</strong> 
                    </li>
                    <ul class="sub-menu" style="list-style: none; background-color: #fafafa;">
                        <li class="sub-menu-item" style="display: flex; align-items: center; padding: 10px 20px 10px 52px; font-size: 15px; color: #495057; cursor: pointer;">원장 조회</li>
                        <li class="sub-menu-item" style="display: flex; align-items: center; padding: 10px 20px 10px 52px; font-size: 15px; color: #495057; cursor: pointer;">주문 처리</li>
                        <li class="sub-menu-item active" id="act-sub-account" style="display: flex; align-items: center; padding: 10px 20px 10px 52px; font-size: 15px; color: #333; font-weight: bold; cursor: pointer;">판매처 계정</li>
                        <li class="sub-menu-item" style="display: flex; align-items: center; padding: 10px 20px 10px 52px; font-size: 15px; color: #495057; cursor: pointer;">캠페인</li>
                        <li class="sub-menu-item" style="display: flex; align-items: center; padding: 10px 20px 10px 52px; font-size: 15px; color: #495057; cursor: pointer;">상품</li>
                    </ul>
                    <li class="menu-item" style="display: flex; align-items: center; padding: 12px 20px; cursor: pointer; color: #495057; font-size: 15px;"><i class="arrow-icon" style="font-size: 11px; color: #adb5bd; margin-right: 8px; font-style: normal; width: 12px; text-align: center;">▶</i><span class="menu-icon" style="margin-right: 10px; display: flex; align-items: center; justify-content: center; width: 20px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#868e96" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg></span>송장</li>
                </ul>
            </aside>
            <main class="main-content" style="flex: 1; padding: 40px; background-color: #ffffff; overflow-y: auto;">
                <div class="page-header" style="display: flex; align-items: center; margin-bottom: 24px;">
                    <div class="page-title" style="font-size: 24px; font-weight: bold; margin-right: 12px;">판매처 계정 관리</div>
                    <div style="font-size: 13px; color: #6c757d; border: 1px solid #ced4da; padding: 4px 8px; border-radius: 4px; cursor: pointer;">📄 설명서</div>
                </div>
                <div class="filter-section" style="display: flex; gap: 15px; margin-bottom: 24px; align-items: center;">
                    <div class="filter-group" style="display: flex; flex-direction: column; gap: 6px;"><label style="font-size: 14px; font-weight: bold;">판매처</label><select style="padding: 10px 14px; border: 1px solid #ced4da; border-radius: 4px; font-size: 15px; height: 42px; width: 160px;"><option>선택</option></select></div>
                    <button class="btn-search" style="background-color: #0040d1; color: white; border: none; padding: 0 24px; border-radius: 4px; cursor: pointer; height: 42px; margin-top: 24px; font-weight: bold; font-size: 15px;">조회</button>
                </div>
                <div style="text-align: right; margin-bottom: 15px;">
                    <button class="btn-outline-primary" id="act-add-btn" style="display: inline-flex; align-items: center; border: 1px solid #0040d1; background-color: white; color: #0040d1; padding: 10px 20px; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer;">판매처 계정 개별 등록</button>
                </div>
                <div class="table-container" style="border-top: 2px solid #333; position: relative; min-height: 450px; margin-bottom: 20px;">
                    <div class="empty-state" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 20px;"><div class="empty-icon" style="width: 44px; height: 44px; border: 2px solid #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px;">i</div><div>출력할 데이터가 없습니다.</div></div>
                </div>
            </main>
        </div>
        </div>

    <div id="view-2" class="manual-step-wrapper">
        <div style="display: flex; height: 100vh; background-color: #f8f9fa; color: #333; overflow: hidden;">
            <div class="modal-overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.5); z-index: 9999; display: flex; justify-content: center; align-items: center;">
                <div class="modal-container" style="width: 520px; background-color: #ffffff; border-radius: 6px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); display: flex; flex-direction: column; max-height: 90vh;">
                    <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px; border-bottom: 1px solid #dee2e6;">
                        <h2 style="font-size: 16px; font-weight: bold; color: #333;">판매처 계정 개별 등록</h2>
                        <button class="btn-close" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#495057" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                    </div>

                    <div class="pop-circle-icon">품고</div>

                    <div class="modal-body" style="padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px;">
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;"><label class="form-label" style="font-size: 13px; font-weight: bold; color: #495057;">판매처명<span class="required-mark" style="color: #fa5252; margin-left: 4px;">*</span></label><select class="form-control required-input" style="padding: 10px 12px; border: 1px solid #748ffc; background-color: #f8fbff; border-radius: 4px; font-size: 14px; outline: none; width: 100%;"><option>스마트스토어(물류사)</option></select></div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                            <label class="form-label" style="font-size: 13px; font-weight: bold; color: #495057;">연동 계정<span class="required-mark" style="color: #fa5252; margin-left: 4px;">*</span></label>
                            <input type="text" id="final-typing-acc" class="form-control required-input" placeholder="스마트스토어 연동용 API 계정 입력" style="padding: 10px 12px; border: 1px solid #748ffc; background-color: #f8fbff; border-radius: 4px; font-size: 14px; outline: none; width: 100%;" readonly>
                        </div>
                        <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;"><label class="form-label" style="font-size: 13px; font-weight: bold; color: #495057;">연동 패스워드</label><input type="password" class="form-control" value="********" style="padding: 10px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; outline: none; width: 100%;" readonly></div>
                    </div>

                        <button class="btn-submit" id="act-submit-btn" style="padding: 10px 20px; border: none; background-color: #0040d1; color: #ffffff; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer;">등록</button>
                    </div>
                </div>
            </div>

        </div>
</div>

<script>
    const badge = document.getElementById('real-click-badge');
    const overlay = document.getElementById('finalOverlay');
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    async function showHighlightAction(targetId, duration = 4000) {
        const target = document.getElementById(targetId);
        const rect = target.getBoundingClientRect();
        const container = document.querySelector('.full-manual-container').getBoundingClientRect();

        target.classList.add('step-focus-highlight');
        badge.style.display = 'block';
        badge.style.left = (rect.left - container.left + rect.width / 2 + 10) + 'px';
        badge.style.top = (rect.top - container.top - 20) + 'px';

        await sleep(duration);

        target.classList.remove('step-focus-highlight');
        badge.style.display = 'none';
    }

    async function runFinalProcess() {
        overlay.classList.add('hidden');
        
        // 1단계: 주문 메뉴 (4초)
        await showHighlightAction('act-order');
        
        // 2단계: 판매처 계정 메뉴 (4초)
        await showHighlightAction('act-sub-account');

        // 3단계: 개별 등록 버튼 (4초)
        await showHighlightAction('act-add-btn');

        // 단계 전환 (원본 코드 2로 교체)
        document.getElementById('view-1').classList.remove('active');
        document.getElementById('view-2').classList.add('active');
        await sleep(1000);

        // 4단계: 타이핑
        const input = document.getElementById('final-typing-acc');
        const text = "gamaok@dohands.com";
        for (let i = 0; i < text.length; i++) {
            input.value += text[i];
            await sleep(70);
        }
        await sleep(1000);

        // 5단계: 최종 등록 버튼 (4초)
        await showHighlightAction('act-submit-btn');

        // 리셋
        await sleep(2000);
        location.reload();
    }
</script>

</body>
