<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>구성원 등록 과정 영상</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f1f3f5;
    }

    body {
      display: block;
    }

    .player-stage {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f1f3f5;
      position: relative;
    }

    .player-scale {
      transform-origin: center center;
      will-change: transform;
      display: inline-block;
    }

    .guide-container {
      width: 1200px;
      height: 850px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
      border: 1px solid #e9ecef;
    }

    /* 클릭 안내 */
    #click-hint {
      position: absolute;
      background: #0040D1;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 4px;
      z-index: 10000;
      pointer-events: none;
      display: none;
      box-shadow: 0 4px 10px rgba(0,64,209,0.3);
      animation: hintBounce 1s infinite;
    }

    @keyframes hintBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .target-highlight {
      outline: 3px solid #0040D1 !important;
      outline-offset: 2px;
      transition: outline 0.2s;
      border-radius: 4px;
    }

    /* 시작 레이어 */
    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .play-overlay.hidden {
      display: none;
    }

    .btn-start {
      background: #0040D1;
      color: #fff;
      border: none;
      padding: 20px 45px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }

    /* 좌우 레이아웃 */
    .app-shell {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* 사이드바 */
    .sidebar {
      width: 280px;
      background: #fff;
      border-right: 1px solid #e9ecef;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-header {
      height: 40px;
    }

    .menu-title {
      font-size: 13px;
      color: #adb5bd;
      padding: 25px 24px 10px;
      font-weight: 700;
    }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 12px 24px;
      color: #495057;
      font-size: 15px;
      width: 100%;
      cursor: default;
    }

    .menu-icon {
      margin-right: 12px;
      width: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .menu-arrow {
      font-size: 10px;
      color: #adb5bd;
      margin-right: 8px;
      font-style: normal;
      width: 10px;
      text-align: center;
    }

    .sub-menu-list {
      width: 100%;
    }

    .sub-item {
      padding: 10px 24px 10px 62px;
      font-size: 14px;
      color: #495057;
      display: block;
      width: 100%;
      cursor: default;
    }

    .sub-item.active-sub {
      color: #0040D1;
      font-weight: 700;
      background: #f0f4ff;
      border-radius: 0 24px 24px 0;
      width: calc(100% - 15px);
    }

    /* 메인 */
    .content-area {
      flex: 1;
      padding: 50px;
      background: #fff;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      width: 100%;
    }

    .btn-add-main {
      background: #f8faff;
      border: 1px solid #e9ecef;
      color: #0040D1;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 700;
      cursor: default;
    }

    .member-list {
      border-top: 1px solid #eee;
      width: 100%;
    }

    .member-item {
      display: flex;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #f1f3f5;
    }

    .avatar-circle {
      width: 48px;
      height: 48px;
      background: #e9ecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #868e96;
      margin-right: 18px;
      font-size: 14px;
    }

    #new-row {
      display: none;
      opacity: 0;
      border-radius: 8px;
    }

    #new-row.active-row {
      display: flex;
      opacity: 1;
      animation: successFlash 2.5s ease-out;
    }

    @keyframes successFlash {
      0%, 100% { box-shadow: 0 0 0 0px transparent; }
      50% { box-shadow: 0 0 0 5px #0040D1; background: #f8faff; }
    }

    /* 오버레이 */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      transform: translateY(100%);
      transition: transform 0.6s ease;
      z-index: 1000;
    }

    .overlay.active {
      transform: translateY(0);
    }

    .overlay-header {
      display: flex;
      align-items: center;
      padding: 20px 30px;
      border-bottom: 1px solid #f1f3f5;
      justify-content: space-between;
    }

    .pop-profile-icon {
      width: 120px;
      height: 120px;
      background: #e9ecef;
      border-radius: 50%;
      margin: 40px auto 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #868e96;
      font-weight: 700;
    }

    .form-card {
      width: 100%;
      max-width: 700px;
      margin: 0 auto;
      border: 1px solid #e9ecef;
      border-radius: 12px;
      padding: 40px;
      background: #fff;
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
    }

    .form-row label {
      width: 120px;
      font-size: 15px;
      font-weight: 700;
      color: #333;
    }

    .form-input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ced4da;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .form-input.typing {
      border-color: #0040D1;
      background: #f8faff;
    }

    .btn-check-duplicate {
      margin-left: 10px;
      padding: 0 20px;
      height: 48px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      color: #adb5bd;
      font-size: 14px;
      font-weight: 700;
    }

    .btn-submit-pop {
      background: #0040D1;
      color: #fff;
      border: none;
      padding: 12px 25px;
      border-radius: 6px;
      font-weight: 700;
      cursor: default;
    }
  </style>
</head>
