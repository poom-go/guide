<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>N배송 가이드</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Pretendard, sans-serif;
}

:root{
  --brand:#0040d1;
  --brand-strong:#0035ad;
  --brand-soft:#edf3ff;
  --brand-soft-2:#f7faff;
  --brand-border:#cfe0ff;
  --bg:#f4f7fc;
  --surface:#ffffff;
  --line:#e7edf7;
  --text:#1f2937;
  --muted:#667085;
  --muted-2:#98a2b3;
  --success:#0f9f6e;
  --success-soft:#ecfdf3;
  --wait:#7c8798;
  --wait-soft:#f2f4f7;
  --shadow:0 18px 42px rgba(15, 23, 42, 0.08);
  --radius-xl:28px;
  --radius-lg:20px;
  --radius-md:16px;
}

html, body {
  width: 100%;
  height: 100%;
  background: linear-gradient(180deg, #f8fbff 0%, #f3f6fc 100%);
  color: var(--text);
  overflow: hidden;
}

body.video-modal-open {
  overflow: hidden;
}

.app {
  display: flex;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 340px;
  flex-shrink: 0;
  background: #fff;
  border-right: 1px solid var(--line);
  padding: 22px 16px 24px;
  overflow-y: auto;
  overflow-x: hidden;
}

.sidebar::-webkit-scrollbar {
  width: 8px;
}
.sidebar::-webkit-scrollbar-thumb {
  background: #d8e3f8;
  border-radius: 999px;
}
.sidebar::-webkit-scrollbar-track {
  background: transparent;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 10px 18px;
  margin-bottom: 8px;
}

.sidebar-brand img {
  height: 28px;
  width: auto;
  object-fit: contain;
  flex-shrink: 0;
}

.sidebar-title {
  font-size: 18px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
}

.sidebar-steps {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-bottom: 40px;
}

.step-card {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 14px;
  background: #fff;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
  transition: 0.2s ease;
}

.step-card.current {
  border-color: var(--brand-border);
  background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
  box-shadow: 0 12px 28px rgba(0, 64, 209, 0.10);
}

.step-card.done {
  border-color: #dce9ff;
  background: #fcfdff;
}

.step-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.step-card-main {
  min-width: 0;
}

.step-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 5px 10px;
  border-radius: 999px;
  background: var(--brand-soft);
  color: var(--brand);
  font-size: 11px;
  font-weight: 900;
  margin-bottom: 8px;
}

.step-card-title {
  font-size: 15px;
  font-weight: 900;
  line-height: 1.45;
  color: var(--text);
  word-break: keep-all;
}

.badge {
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 900;
}

.badge.done {
  background: var(--success-soft);
  color: var(--success);
}

.badge.ing {
  background: var(--brand);
  color: #fff;
}

.badge.wait {
  background: var(--wait-soft);
  color: var(--wait);
}

.step-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sub-item {
  padding: 11px 12px;
  border-radius: 14px;
  cursor: pointer;
  font-size: 14px;
  line-height: 1.45;
  color: #475467;
  transition: 0.18s ease;
  border: 1px solid transparent;
}

.sub-item:hover {
  background: #f7faff;
  border-color: #e6eefc;
}

.sub-item.active {
  background: linear-gradient(135deg, #eef4ff 0%, #f8fbff 100%);
  color: var(--brand);
  font-weight: 800;
  border-color: rgba(0, 64, 209, 0.12);
  box-shadow: inset 0 0 0 1px rgba(0, 64, 209, 0.05);
}

.optional {
  font-size: 11px;
  color: var(--muted-2);
  margin-left: 6px;
  font-weight: 700;
}

/* ===== MAIN ===== */
.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: transparent;
}

.main-shell {
  flex: 1;
  min-height: 0;
  padding: 24px;
  overflow: hidden;
}

.content-card {
  width: 100%;
  height: 100%;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
}

/* ===== HEADER ===== */
.content-header {
  padding: 26px 30px 22px;
  border-bottom: 1px solid #edf2fa;
  background: #fff;
  flex-shrink: 0;
}

.content-header-inner {
  max-width: 920px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.content-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}

.content-step-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--brand-soft);
  color: var(--brand);
  font-size: 13px;
  font-weight: 900;
  border: 1px solid var(--brand-border);
}

.content-progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 280px;
}

.content-progress-bar {
  flex: 1;
  height: 10px;
  background: #edf2fa;
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}

.content-progress-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, var(--brand) 0%, #2f67e7 100%);
  border-radius: 999px;
  transition: width 0.25s ease;
}

.content-progress-text {
  font-size: 14px;
  font-weight: 900;
  color: var(--brand);
  white-space: nowrap;
}

.content-heading {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  flex-wrap: wrap;
}

.content-heading-main {
  flex: 1;
  min-width: 0;
}

.content-title {
  font-size: 30px;
  font-weight: 900;
  color: var(--text);
  line-height: 1.28;
  text-align: left;
  letter-spacing: -0.03em;
}

.content-desc {
  margin-top: 10px;
  font-size: 15px;
  line-height: 1.8;
  color: var(--muted);
  text-align: left;
  max-width: 760px;
}

.content-header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.btn {
  min-height: 46px;
  padding: 0 18px;
  border-radius: 14px;
  font-weight: 800;
  cursor: pointer;
  border: none;
  font-size: 14px;
  transition: 0.18s ease;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn-ghost {
  border: 1px solid var(--line);
  background: #fff;
  color: #475467;
}

.btn-ghost:hover {
  background: #f8fbff;
}

.btn-help {
  border: 1px solid var(--brand-border);
  color: var(--brand);
  background: #fff;
}

.btn-help:hover {
  background: #f8fbff;
}

.btn-next {
  background: var(--brand);
  color: #fff;
  box-shadow: 0 10px 22px rgba(0, 64, 209, 0.18);
}

.btn-next:hover {
  filter: brightness(0.98);
}

.btn-complete {
  background: linear-gradient(135deg, #0c4be0 0%, #2d67eb 100%);
  color: #fff;
}

/* ===== BODY ===== */
.content-body {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 28px 30px 32px;
  background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
}

.step-content-shell {
  max-width: 920px;
  height: 100%;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.body-topline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  flex-shrink: 0;
}

.step-section-title {
  text-align: left;
  font-size: 22px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.02em;
}

.body-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, #dbe7fb 18%, #dbe7fb 82%, transparent 100%);
  margin-bottom: 22px;
  flex-shrink: 0;
}

.video-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.video-cta-label {
  font-size: 15px;
  font-weight: 800;
  color: var(--brand);
  line-height: 1;
}

.video-cta-video {
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 999px;
  background: var(--brand);
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(0, 64, 209, 0.18);
  transition: 0.18s ease;
}

.video-cta-video:hover {
  transform: translateY(-1px);
  filter: brightness(0.98);
}

.video-cta-video svg {
  width: 17px;
  height: 17px;
  display: block;
}

.step-content {
  width: 100%;
  flex: 1;
  min-height: 0;
  overflow: auto;
  padding-right: 4px;
}

.step-content::-webkit-scrollbar {
  width: 0;
  height: 0;
}
.step-content {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

/* 주입된 html 공통 */
.step-content .step-left-content {
  width: 100%;
}

.step-content .step-left-content > section {
  width: 100%;
  max-width: 920px;
  margin-left: auto !important;
  margin-right: auto !important;
  border-radius: 18px !important;
}

.step-content .step-left-content > section + section {
  margin-top: 16px !important;
}

.step-content .step-left-content h3,
.step-content .step-left-content h4,
.step-content .step-left-content h5 {
  text-align: left !important;
  color: var(--text) !important;
}

.step-content .step-left-content p,
.step-content .step-left-content li,
.step-content .step-left-content ol,
.step-content .step-left-content ul {
  text-align: left !important;
}

.step-content .step-left-content p,
.step-content .step-left-content li {
  color: #475467 !important;
}

.step-content .step-left-content ol,
.step-content .step-left-content ul {
  padding-left: 22px !important;
}

.step-content .step-left-content a {
  color: var(--brand);
  font-weight: 700;
}

/* ===== FOOT ===== */
.content-footer {
  max-width: 920px;
  width: 100%;
  margin: 20px auto 0;
  padding-top: 18px;
  border-top: 1px solid #edf2fa;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  flex-shrink: 0;
}

.footer-note {
  font-size: 13px;
  line-height: 1.7;
  color: var(--muted);
  max-width: 580px;
}

.footer-actions {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

/* ===== HELP ===== */
.help {
  position: fixed;
  right: 0;
  top: 0;
  width: 420px;
  max-width: 100%;
  height: 100%;
  background: #fff;
  box-shadow: -16px 0 38px rgba(15, 23, 42, 0.12);
  transform: translateX(100%);
  transition: 0.28s ease;
  padding: 20px;
  overflow: auto;
  z-index: 100;
  border-left: 1px solid #edf2fa;
}

.help.open {
  transform: translateX(0);
}

.faq-item {
  margin-bottom: 10px;
  border: 1px solid #edf2fa;
  border-radius: 14px;
  overflow: hidden;
  background: #fff;
}

.faq-q {
  padding: 14px 14px;
  font-weight: 800;
  cursor: pointer;
  background: #fff;
  color: var(--text);
}

.faq-q:hover {
  background: #f8fbff;
}

.faq-a {
  display: none;
  padding: 0 14px 14px;
  font-size: 14px;
  line-height: 1.8;
  color: #4b5563;
}

.faq-item.open .faq-a {
  display: block;
}

/* ===== VIDEO MODAL ===== */
.video-modal {
  position: fixed;
  inset: 0;
  display: none;
  z-index: 2000;
}

.video-modal.open {
  display: block;
}

.video-modal-dim {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.62);
}

.video-modal-dialog {
  position: relative;
  z-index: 2;
  width: min(1400px, calc(100vw - 60px));
  height: min(900px, calc(100vh - 60px));
  margin: 30px auto;
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
  display: flex;
  flex-direction: column;
}

.video-modal-header {
  height: 64px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px 0 24px;
  border-bottom: 1px solid #edf2fa;
  background: #fff;
}

.video-modal-title {
  font-size: 18px;
  font-weight: 900;
  color: #111827;
}

.video-modal-close {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 999px;
  background: #f3f6fb;
  color: var(--brand);
  font-size: 24px;
  line-height: 1;
  cursor: pointer;
}

.video-modal-body {
  flex: 1;
  min-height: 0;
  background: #f8fafc;
}

.video-modal-body iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: #f8fafc;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1200px) {
  .sidebar {
    width: 300px;
  }
}

@media (max-width: 1024px) {
  .content-header-inner,
  .step-content-shell,
  .content-footer,
  .step-content .step-left-content > section {
    max-width: 100%;
  }

  .content-heading {
    flex-direction: column;
    align-items: flex-start;
  }

  .content-header-actions {
    width: 100%;
    flex-wrap: wrap;
  }

  .content-header-actions .btn {
    flex: 1;
  }

  .content-progress-wrap {
    width: 100%;
    min-width: 0;
  }

  .footer-actions {
    width: 100%;
  }

  .footer-actions .btn {
    flex: 1;
  }
}

@media (max-width: 768px) {
  .app {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    height: auto;
    max-height: 38vh;
    border-right: none;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }

  .main-shell {
    padding: 12px;
  }

  .content-header,
  .content-body {
    padding: 20px;
  }

  .content-title {
    font-size: 24px;
  }

  .step-section-title {
    font-size: 20px;
  }

  .help {
    width: 100%;
  }

  .video-modal-dialog {
    width: calc(100vw - 20px);
    height: calc(100vh - 20px);
    margin: 10px auto;
    border-radius: 16px;
  }

  .video-cta-label {
    font-size: 14px;
  }

  .video-cta-video {
    width: 32px;
    height: 32px;
  }
}
</style>
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="./Primary Logo.png" alt="Primary Logo" onerror="this.style.display='none'">
      <div class="sidebar-title">N배송 가이드</div>
    </div>

    <div id="sidebar" class="sidebar-steps"></div>
  </aside>

  <section class="main">
    <div class="main-shell">
      <div class="content-card">

        <div class="content-header">
          <div class="content-header-inner">

            <div class="content-topline">
              <div class="content-step-label" id="stepLabel">현재 단계</div>

              <div class="content-progress-wrap">
                <div class="content-progress-bar" aria-hidden="true">
                  <div class="content-progress-fill" id="progressFill"></div>
                </div>
                <div class="content-progress-text" id="progressText">진행률 0%</div>
              </div>
            </div>

            <div class="content-heading">
              <div class="content-heading-main">
                <div class="content-title" id="title"></div>
                <div class="content-desc" id="stepDesc"></div>
              </div>

              <div class="content-header-actions">
                <button class="btn btn-help" id="helpBtn" type="button">도움말</button>
              </div>
            </div>

          </div>
        </div>

        <div class="content-body">
          <div class="step-content-shell">

            <div class="body-topline">
              <h3 class="step-section-title">진행 방법</h3>

              <div class="video-cta">
                <div class="video-cta-label">진행 과정 보러가기</div>
                <button type="button" class="video-cta-video" id="openVideoBtn" aria-label="진행 과정 영상 보기">
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 10.5V7.8C15 6.81 14.19 6 13.2 6H5.8C4.81 6 4 6.81 4 7.8V16.2C4 17.19 4.81 18 5.8 18H13.2C14.19 18 15 17.19 15 16.2V13.5L20 17V7L15 10.5Z" fill="currentColor"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="body-divider"></div>

            <div class="step-content" id="left"></div>

            <div class="content-footer">
              <div class="footer-note" id="footerNote">
                현재 단계 확인 후 다음 단계로 이동해주세요.
              </div>

              <div class="footer-actions">
                <button class="btn btn-ghost" id="prevBtn" type="button">이전</button>
                <button class="btn btn-next" id="nextBtn" type="button">다음 단계</button>
              </div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </section>
</div>

<div class="help" id="helpBox"></div>

<div class="video-modal" id="videoModal">
  <div class="video-modal-dim" id="videoModalDim"></div>

  <div class="video-modal-dialog">
    <div class="video-modal-header">
      <div class="video-modal-title" id="videoModalTitle">과정 영상</div>
      <button type="button" class="video-modal-close" id="videoModalClose">×</button>
    </div>

    <div class="video-modal-body">
      <iframe
        id="videoModalFrame"
        src=""
        title="과정 영상"
        loading="eager"
        referrerpolicy="no-referrer"
        allow="autoplay"
      ></iframe>
    </div>
  </div>
</div>

<script>
const STEPS = [
  {
    title: "STEP1. 품고 나우 설정",
    items: [
      {
        title: "품고 나우 로그인",
        required: true,
        left: "./steps/step1-login-left.html",
        right: "./steps/step1-login-right-player.html",
        help: "./help/step1-help.html",
        desc: "품고 나우 접속 및 기본 환경 설정을 진행합니다."
      },
      {
        title: "구성원 추가",
        required: false,
        left: "./steps/step1-member-left.html",
        right: "./steps/step1-member-right-player.html",
        help: "./help/step1-member-help.html",
        desc: "운영에 필요한 구성원을 추가하고 권한을 확인합니다."
      }
    ]
  },
  {
    title: "STEP2. 풀필먼트 연동",
    items: [
      {
        title: "판매처 계정 등록",
        required: true,
        left: "./steps/step2-new-left.html",
        right: "./steps/step2-new-right-player.html",
        help: "./help/step2-new-help.html",
        desc: "판매처 계정을 등록하여 연동 준비를 진행합니다."
      },
      {
        title: "풀필먼트 연동",
        required: true,
        left: "./steps/step2-api-left.html",
        right: "./steps/step2-api-right-player.html",
        help: "./help/step2-api-help.html",
        desc: "네이버 풀필먼트 계약 연동을 연결합니다."
      },
      {
        title: "N배송 프로그램 약관 동의",
        required: true,
        left: "./steps/step2-npro-left.html",
        right: "./steps/step2-npro-right-player.html",
        help: "./help/step2-npro-help.html",
        desc: "N배송 프로그램 이용을 위해 약관 동의를 완료합니다."
      }
    ]
  },
  {
    title: "STEP3. SKU 등록",
    items: [
      {
        title: "SKU 등록",
        required: true,
        left: "./steps/step3-sku-left.html",
        right: "./steps/step3-sku-right-player.html",
        help: "./help/step3-sku-help.html",
        desc: "운영 SKU 등록 기준 및 유의사항을 확인합니다."
      },
      {
        title: "상품 매핑",
        required: true,
        left: "./steps/step3-mapping-left.html",
        right: "./steps/step3-mapping-right-player.html",
        help: "./help/step3-mapping-help.html",
        desc: "등록된 SKU와 실제 판매 상품 정보를 매핑합니다."
      }
    ]
  },
  {
    title: "STEP4. 초도 입고",
    items: [
      {
        title: "입고 가이드",
        required: true,
        left: "./steps/step4-inbound-left.html",
        right: "./steps/step4-inbound-right-player.html",
        help: "./help/step4-inbound-help.html",
        desc: "초도 입고 전 준비사항과 진행 기준을 확인합니다."
      },
      {
        title: "초도 입고 패킹리스트 제출하기",
        required: true,
        left: "./steps/step4-packing-left.html",
        right: "./steps/step4-packing-right-player.html",
        help: "./help/step4-packing-help.html",
        desc: "초도 입고를 위한 패킹리스트를 작성하고 제출합니다."
      }
    ]
  },
  {
    title: "STEP5. N배송 설정하기",
    items: [
      {
        title: "N배송 설정하기",
        required: true,
        left: "./steps/step5-left.html",
        right: "./steps/step5-right-player.html",
        help: "./help/step5-help.html",
        desc: "최종적으로 N배송 설정을 완료합니다."
      }
    ]
  }
];

let step = 0;
let item = 0;
const done = {};

const sidebar = document.getElementById("sidebar");
const left = document.getElementById("left");
const title = document.getElementById("title");
const stepDesc = document.getElementById("stepDesc");
const stepLabel = document.getElementById("stepLabel");

const helpBox = document.getElementById("helpBox");
const helpBtn = document.getElementById("helpBtn");

const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const footerNote = document.getElementById("footerNote");

const progressFill = document.getElementById("progressFill");
const progressText = document.getElementById("progressText");

const openVideoBtn = document.getElementById("openVideoBtn");

const videoModal = document.getElementById("videoModal");
const videoModalDim = document.getElementById("videoModalDim");
const videoModalClose = document.getElementById("videoModalClose");
const videoModalTitle = document.getElementById("videoModalTitle");
const videoModalFrame = document.getElementById("videoModalFrame");

function getRequiredItems() {
  return STEPS.flatMap((s, si) =>
    s.items.map((it, ii) => ({ ...it, key: `${si}-${ii}` })).filter(it => it.required)
  );
}

function getStepStatus(si) {
  const requiredItems = STEPS[si].items
    .map((it, ii) => ({ ...it, idx: ii }))
    .filter(it => it.required);

  if (requiredItems.length === 0) return "wait";

  const doneCount = requiredItems.filter(it => done[`${si}-${it.idx}`]).length;

  if (doneCount === requiredItems.length) return "done";
  if (si === step) return "ing";
  return "wait";
}

function getCurrentFlatIndex() {
  let index = 0;
  for (let si = 0; si < STEPS.length; si++) {
    for (let ii = 0; ii < STEPS[si].items.length; ii++) {
      if (si === step && ii === item) return index;
      index++;
    }
  }
  return 0;
}

function getTotalFlatCount() {
  return STEPS.reduce((acc, s) => acc + s.items.length, 0);
}

function renderSidebar() {
  sidebar.innerHTML = "";

  STEPS.forEach((s, si) => {
    const status = getStepStatus(si);
    const card = document.createElement("div");
    card.className = `step-card ${status === "ing" ? "current" : status === "done" ? "done" : ""}`;

    card.innerHTML = `
      <div class="step-card-header">
        <div class="step-card-main">
          <div class="step-chip">STEP ${si + 1}</div>
          <div class="step-card-title">${s.title.replace(/^STEP\d+\.\s*/i, "")}</div>
        </div>
        <span class="badge ${status}">
          ${status === "done" ? "완료" : status === "ing" ? "진행중" : "대기중"}
        </span>
      </div>
      <div class="step-items"></div>
    `;

    const itemsWrap = card.querySelector(".step-items");

    s.items.forEach((it, ii) => {
      const sub = document.createElement("div");
      sub.className = "sub-item" + (si === step && ii === item ? " active" : "");
      sub.innerHTML = `${it.title}${!it.required ? '<span class="optional">선택</span>' : ""}`;
      sub.onclick = () => {
        step = si;
        item = ii;
        render();
      };
      itemsWrap.appendChild(sub);
    });

    sidebar.appendChild(card);
  });
}

async function load(path) {
  const res = await fetch(path + "?v=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(`파일을 불러오지 못했습니다: ${path}`);
  return await res.text();
}

function bindFAQ() {
  document.querySelectorAll(".faq-q").forEach(q => {
    q.onclick = () => q.parentElement.classList.toggle("open");
  });
}

function openVideoModal(titleText, src) {
  videoModalTitle.textContent = `${titleText} 과정 영상`;
  videoModalFrame.src = `${src}?v=${Date.now()}`;
  videoModal.classList.add("open");
  document.body.classList.add("video-modal-open");
}

function closeVideoModal() {
  videoModal.classList.remove("open");
  videoModalFrame.src = "";
  document.body.classList.remove("video-modal-open");
}

function renderProgress() {
  const required = getRequiredItems();
  const total = required.length;
  const completed = required.filter(it => done[it.key]).length;
  const percent = total === 0 ? 0 : Math.floor((completed / total) * 100);

  progressFill.style.width = `${percent}%`;
  progressText.innerText = `진행률 ${percent}%`;
}

function renderFooterState() {
  const isFirst = step === 0 && item === 0;
  const isLastStep = step === STEPS.length - 1;
  const isLastItem = item === STEPS[step].items.length - 1;

  prevBtn.disabled = isFirst;
  prevBtn.style.opacity = isFirst ? "0.5" : "1";
  prevBtn.style.cursor = isFirst ? "default" : "pointer";

  if (isLastStep && isLastItem) {
    nextBtn.textContent = "가이드 완료";
    nextBtn.classList.add("btn-complete");
    nextBtn.classList.remove("btn-next");
    footerNote.textContent = "마지막 단계입니다. 내용을 확인한 뒤 가이드를 완료해주세요.";
  } else {
    nextBtn.textContent = "다음 단계";
    nextBtn.classList.add("btn-next");
    nextBtn.classList.remove("btn-complete");
    footerNote.textContent = "현재 단계 확인 후 다음 단계로 이동해주세요.";
  }
}

async function render() {
  closeVideoModal();
  renderSidebar();
  renderProgress();
  renderFooterState();

  const currentStep = STEPS[step];
  const data = currentStep.items[item];
  const flatIndex = getCurrentFlatIndex() + 1;
  const totalFlat = getTotalFlatCount();

  stepLabel.textContent = `STEP ${step + 1} · ${flatIndex}/${totalFlat}`;
  title.innerText = data.title;
  stepDesc.innerText = data.desc || "";

  try {
    left.innerHTML = await load(data.left);
  } catch (e) {
    left.innerHTML = `<div style="color:#ef4444;font-size:14px;">${e.message}</div>`;
  }

  openVideoBtn.onclick = () => openVideoModal(data.title, data.right);

  try {
    helpBox.innerHTML = await load(data.help);
    bindFAQ();
  } catch (e) {
    helpBox.innerHTML = `<div style="color:#ef4444;font-size:14px;">${e.message}</div>`;
  }
}

helpBtn.onclick = () => {
  helpBox.classList.toggle("open");
};

prevBtn.onclick = () => {
  if (step === 0 && item === 0) return;

  if (item > 0) {
    item--;
    render();
    return;
  }

  if (step > 0) {
    step--;
    item = STEPS[step].items.length - 1;
    render();
  }
};

nextBtn.onclick = () => {
  const current = STEPS[step].items[item];

  if (current.required) {
    done[`${step}-${item}`] = true;
  }

  if (item < STEPS[step].items.length - 1) {
    item++;
    render();
    return;
  }

  if (step < STEPS.length - 1) {
    step++;
    item = 0;
    render();
    return;
  }

  render();
  alert("수고하셨습니다! 가이드 확인이 완료되었습니다.");
};

videoModalClose.addEventListener("click", closeVideoModal);
videoModalDim.addEventListener("click", closeVideoModal);

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") {
    helpBox.classList.remove("open");
    closeVideoModal();
  }
});

render();
</script>
