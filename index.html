<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N배송 가이드</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"/>

<style>
* { box-sizing: border-box; margin:0; padding:0; font-family:Pretendard, sans-serif; }

html, body {
  width:100%; height:100%;
  background:#f6f8fb;
  overflow:hidden;
}

.app { display:flex; height:100vh; }

/* ===== SIDEBAR ===== */
.sidebar {
  width:320px;
  background:#fff;
  border-right:1px solid #eee;
  padding:20px;
  overflow:auto;
}

.sidebar-brand {
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
}

.sidebar-brand img { height:28px; }

.sidebar-title {
  font-size:18px;
  font-weight:800;
}

.step { margin-bottom:22px; }

.step-title {
  font-weight:800;
  font-size:14px;
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.badge {
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
}

.badge.done { background:#111; color:#fff; }
.badge.ing { background:#0040d1; color:#fff; }
.badge.wait { background:#e5e7eb; }

.sub-item {
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

.sub-item.active {
  background:#eef3ff;
  color:#0040d1;
  font-weight:700;
}

.optional {
  font-size:11px;
  color:#9ca3af;
}

/* ===== MAIN ===== */
.main { flex:1; display:flex; flex-direction:column; }

.top {
  display:flex;
  justify-content:space-between;
  padding:20px 30px;
  background:#fff;
  border-bottom:1px solid #eee;
}

.title { font-size:20px; font-weight:800; }

.progress { color:#0040d1; font-weight:700; }

.content { flex:1; display:flex; }

/* ===== LEFT ===== */
.left {
  width:50%;
  padding:30px;
  border-right:1px solid #eee;
  display:flex;
  flex-direction:column;
  background:#fff;
}

.left-body {
  flex:1;
  overflow:auto;
}

.left-actions {
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn {
  flex:1;
  padding:12px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  border:none;
}

.btn-primary { background:#0040d1; color:#fff; }
.btn-outline { border:1px solid #0040d1; color:#0040d1; background:#fff; }

/* ===== RIGHT ===== */
.right {
  width:50%;
  padding:20px;
  background:#f9fafc;
}

.viewer {
  width:100%;
  height:100%;
  background:#fff;
  border-radius:16px;
  border:1px solid #e5e7eb;
  overflow:hidden;
}

/* ===== HELP ===== */
.help {
  position:fixed;
  right:0;
  top:0;
  width:420px;
  height:100%;
  background:#fff;
  box-shadow:-10px 0 30px rgba(0,0,0,0.1);
  transform:translateX(100%);
  transition:0.3s;
  padding:20px;
  overflow:auto;
}

.help.open { transform:translateX(0); }

.faq-item { margin-bottom:10px; border:1px solid #eee; border-radius:10px; }

.faq-q {
  padding:12px;
  font-weight:700;
  cursor:pointer;
}

.faq-a {
  display:none;
  padding:12px;
  font-size:14px;
}

.faq-item.open .faq-a { display:block; }
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="./Primary Logo.png">
      <div class="sidebar-title">N배송 가이드</div>
    </div>

    <div id="sidebar"></div>
  </aside>

  <!-- MAIN -->
  <section class="main">

    <div class="top">
      <div class="title" id="title"></div>
      <div class="progress" id="progress"></div>
    </div>

    <div class="content">

      <!-- LEFT -->
      <div class="left">
        <div class="left-body" id="left"></div>

        <div class="left-actions">
          <button class="btn btn-outline" id="helpBtn">도움말</button>
          <button class="btn btn-primary" id="nextBtn">다음 단계</button>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="viewer" id="right"></div>
      </div>

    </div>
  </section>
</div>

<!-- HELP -->
<div class="help" id="helpBox"></div>

<script>

const STEPS = [
  {
    title:"STEP1. 품고 나우 설정",
    items:[
      {
        title:"품고 나우 로그인",
        required:true,
        left:"./steps/step1-login-left.html",
        right:"./steps/step1-login-right-player.html",
        help:"./help/step1-help.html"
      },
      {
        title:"구성원 추가",
        required:false,
        left:"./steps/step1-member-left.html",
        right:"./steps/step1-member-right-player.html",
        help:"./help/step1-member-help.html"
      }
    ]
  }
];

let step = 0;
let item = 0;
const done = {};

const sidebar = document.getElementById("sidebar");
const left = document.getElementById("left");
const right = document.getElementById("right");
const title = document.getElementById("title");
const progress = document.getElementById("progress");
const helpBox = document.getElementById("helpBox");

function renderSidebar() {
  sidebar.innerHTML = "";

  STEPS.forEach((s, si)=>{
    const el = document.createElement("div");
    el.className="step";

    el.innerHTML = `
      <div class="step-title">
        ${s.title}
        <span class="badge ${si===step?'ing':'wait'}">${si===step?'진행중':'대기중'}</span>
      </div>
    `;

    s.items.forEach((it, ii)=>{
      const sub = document.createElement("div");
      sub.className="sub-item"+(si===step&&ii===item?" active":"");
      sub.innerHTML = `${it.title} ${!it.required?'<span class="optional">선택</span>':''}`;
      sub.onclick=()=>{
        step=si; item=ii;
        render();
      };
      el.appendChild(sub);
    });

    sidebar.appendChild(el);
  });
}

async function load(path){
  const res = await fetch(path+"?v="+Date.now());
  return await res.text();
}

async function render(){
  renderSidebar();

  const data = STEPS[step].items[item];

  title.innerText = data.title;

  left.innerHTML = await load(data.left);

  // 🔥 핵심: 무조건 iframe
  right.innerHTML = `
    <iframe 
      src="${data.right}"
      style="width:100%;height:100%;border:0;"
    ></iframe>
  `;

  helpBox.innerHTML = await load(data.help);

  bindFAQ();

  progress.innerText = "진행률 계산 생략 (원하면 추가해줌)";
}

function bindFAQ(){
  document.querySelectorAll(".faq-q").forEach(q=>{
    q.onclick=()=>q.parentElement.classList.toggle("open");
  });
}

document.getElementById("nextBtn").onclick=()=>{
  item++;
  if(item>=STEPS[step].items.length){
    step++;
    item=0;
  }
  render();
};

document.getElementById("helpBtn").onclick=()=>{
  helpBox.classList.toggle("open");
};

render();

</script>

</body>
</html>
